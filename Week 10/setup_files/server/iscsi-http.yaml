apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: iscsi-target-http
  labels:
    app: iscsi-target-http
spec:
  selector:
    matchLabels:
      app: iscsi-target-http
  template:
    metadata:
      labels:
        app: iscsi-target-http
    spec:
      # Only run on nodes with iscsi-target role
      nodeSelector:
        node-role.kubernetes.io/iscsi-target: "true"

      # Tolerate any taints on iscsi-target nodes
      tolerations:
        - key: node-role.kubernetes.io/iscsi-target
          operator: Exists
          effect: NoSchedule

      # Pod specification
      containers:
        - name: iscsi-http
          image: notmybug/iscsi-http:latest
          imagePullPolicy: Always

          # Security context for accessing /sys
          securityContext:
            privileged: false
            runAsUser: 0
            capabilities:
              drop:
                - ALL

          # Container ports
          ports:
            - name: http
              containerPort: 9000
              protocol: TCP

          # Environment variables
          env:
            - name: TARGET_CONFIG_PATH
              value: /host-sys/kernel/config/target
            - name: PYTHONUNBUFFERED
              value: "1"

          # Volume mounts
          volumeMounts:
            # Mount the target configuration directory (read-only)
            - name: target-config
              mountPath: /host-sys/kernel/config/target
              readOnly: true

          # Liveness probe - check if HTTP server is responding
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          # Readiness probe - check if server is ready to serve
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2

          # Resource limits and requests
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"

          # Startup probe for slow container startup
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 0
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30

      # Volumes
      volumes:
        # Mount /sys/kernel/config/target from host (read-only)
        - name: target-config
          hostPath:
            path: /sys/kernel/config/target
            type: Directory

      # Set hostname from node name
      hostNetwork: false
      # Restart policy
      restartPolicy: Always
      # Termination grace period
      terminationGracePeriodSeconds: 30
